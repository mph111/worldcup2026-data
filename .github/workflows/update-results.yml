name: Update World Cup results

on:
  schedule:
    # 06:00, 12:00, 18:00, 23:00 UTC daily. Cron is in UTC; adjust as you like.
    - cron: "0 6,12,18,23 * * *"
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # needed to commit the updated JSON

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          JSON_PATH: worldcup2026.json
        run: python scripts/update_results.py

      - name: Commit & push if changed
        run: |
          git config user.name  "results-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- worldcup2026.json; then
            git add worldcup2026.json
            git commit -m "Auto-update results"
            git push
          else
            echo "No changes to commit."
          fi
